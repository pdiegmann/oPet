name: Build and Release Images

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - '.dockerignore'
              - 'package.json'
              - 'bun.lock'
              - 'backend/**'
              - 'frontend/package.json'
            frontend:
              - '.dockerignore'
              - 'frontend/**'

  backend-image:
    needs: changes
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set backend image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/backend"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"
          echo "year_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend (and push on non-PR events)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.year }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.year_month }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,scope=backend-image,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  frontend-image:
    needs: changes
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set frontend image metadata
        id: meta
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/frontend"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "year=$(date -u +%Y)" >> "$GITHUB_OUTPUT"
          echo "year_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend (and push on non-PR events)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.year }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.year_month }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,scope=frontend-image,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
