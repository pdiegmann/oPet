version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-opet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opet}
      POSTGRES_DB: ${DB_NAME:-opet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/pdiegmann/opet/backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-opet}:${DB_PASSWORD:-opet}@db:5432/${DB_NAME:-opet}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/pdiegmann/opet/frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
